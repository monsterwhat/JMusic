<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="theme-color" content="#48c78e">
        <title id="pageTitle">JMedia Music</title>

        <!-- Scripts -->
        <script src="/js/theme-initializer.js"></script>
        <script src="/js/htmx.min.js"></script>
        <script defer src="/lib/alpine.min.js"></script>
        <script>
            document.addEventListener('alpine:init', () => {
                Alpine.store('profile', { currentProfile: null });
            });
        </script>

        <!-- CSS -->
        <link rel="stylesheet" href="/css/bulma.min.css">
        <link rel="stylesheet" href="/css/mobile.css">
        <link rel="stylesheet" href="/lib/font-awesome/all.min.css">
        <link rel="stylesheet" href="/lib/primeicons.css">
        <link rel="stylesheet" href="/css/custom.css">
        <link id="favicon" rel="icon" type="image/x-icon" href="logo.png">

        <style>
            :root { --sidebar-width: 240px; }
            .plex-layout.collapsed { --sidebar-width: 72px; }

            /* SOLID FLEX LAYOUT */
            .plex-content {
                flex: 1;
                display: flex;
                flex-direction: column;
                position: relative;
                overflow: hidden !important;
            }

            .music-main-wrapper {
                flex: 1;
                overflow-y: auto !important;
                padding: 0 !important; /* Set to 0 */
                min-height: 0; /* CRITICAL for flex scrolling */
            }

            .mobile-song-list {
                padding: 0 !important;
                margin-left: 0.25rem !important;
                margin-right: 0.25rem !important;
            }

            .mobile-pagination-simple {
                margin: 0 !important;
                display: flex !important;
                flex-direction: column !important; /* Stack vertically */
                align-items: center !important;
                justify-content: center !important;
                gap: 1rem !important;
                padding: 1.5rem !important;
                border-top: 1px solid rgba(255,255,255,0.1);
            }

            .mobile-pagination-info {
                font-size: 0.8rem;
                opacity: 0.5;
                margin-bottom: 0.25rem;
            }

            .mobile-pagination-controls {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                gap: 1rem !important;
            }

            .mobile-pagination-pages {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                gap: 0.5rem !important;
            }

            .mobile-pagination-prev, .mobile-pagination-next {
                background: rgba(255,255,255,0.05) !important;
                border: 1px solid rgba(255,255,255,0.1) !important;
                color: white !important;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 8px;
                cursor: pointer;
            }

            .mobile-pagination-prev:disabled, .mobile-pagination-next:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            /* PLAYER BAR */
            .persistent-music-player {
                flex-shrink: 0;
                height: 100px;
                background: rgba(10, 10, 10, 0.98);
                backdrop-filter: blur(40px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding: 0 !important;
                z-index: 10;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
                position: relative;
                display: flex;
                flex-direction: column;
            }

            .mobile-player {
                width: 100% !important;
                flex: 1;
                display: flex !important;
                align-items: center !important;
                padding: 0 2rem !important;
                max-width: none !important;
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
                position: relative !important;
                z-index: 5;
            }

            .mobile-player-info {
                display: flex !important;
                align-items: center !important;
                gap: 1rem !important;
                flex: 0 1 30% !important;
                min-width: 0;
            }

            .mobile-player-artwork {
                width: 50px !important;
                height: 50px !important;
                border-radius: 8px !important;
                flex-shrink: 0 !important;
                background: rgba(255,255,255,0.05);
                overflow: hidden;
                display: flex !important;
                align-items: center;
                justify-content: center;
            }

            .mobile-player-artwork img { width: 100% !important; height: 100% !important; object-fit: cover !important; }

            .mobile-player-details { flex: 1 !important; min-width: 0; }
            .mobile-player-title { font-size: 1rem !important; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 !important; }
            .mobile-player-artist { font-size: 0.85rem !important; color: #48c774; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; margin: 0 !important; }

            .mobile-player-controls {
                position: absolute !important;
                left: calc(50% - (var(--sidebar-width) / 2)) !important; /* Center to screen when sidebar is on left */
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                display: flex !important;
                align-items: center !important;
                gap: 2rem !important;
                z-index: 10;
                margin: 0 !important;
                transition: left 0.2s ease;
            }

            .plex-layout.sidebar-right .mobile-player-controls {
                left: calc(50% + (var(--sidebar-width) / 2)) !important; /* Center to screen when sidebar is on right */
            }

            .mobile-player-right-side {
                flex: 1 !important;
                display: flex !important;
                justify-content: flex-end !important;
                align-items: center !important;
            }

            .mobile-btn {
                background: transparent !important;
                border: none !important;
                cursor: pointer !important;
                padding: 5px !important;
            }

            .mobile-btn i { font-size: 1.2rem !important; color: white !important; }
            .mobile-btn-primary { 
                width: 40px !important; 
                height: 40px !important; 
                background: #48c774 !important; 
                border-radius: 50% !important; 
                display: flex !important; 
                align-items: center; 
                justify-content: center; 
            }
            .mobile-btn-primary i { color: black !important; font-size: 1.4rem !important; }

            /* VOLUME VERTICAL HOVER - ROTATED RANGE */
            .mobile-volume-wrapper {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
            }

            .volume-slider-container {
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(20, 20, 20, 0.95);
                backdrop-filter: blur(10px);
                padding: 20px 10px;
                border-radius: 8px;
                border: 1px solid rgba(255,255,255,0.1);
                display: none;
                z-index: 1001;
                height: 150px;
                pointer-events: auto;
            }

            .mobile-volume-wrapper:hover .volume-slider-container {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .vertical-volume#volumeProgressBar {
                appearance: none;
                -webkit-appearance: none;
                width: 100px;
                height: 6px;
                background: rgba(255,255,255,0.1) !important;
                background-image: linear-gradient(#48c774, #48c774) !important;
                background-size: var(--slider-progress, 0%) 100% !important;
                background-repeat: no-repeat !important;
                outline: none;
                border-radius: 3px;
                transform: rotate(-90deg); /* Standard rotation */
                cursor: pointer;
                position: absolute;
                top: 50%;
            }

            /* PROGRESS AT BOTTOM - ENHANCED CLICK AREA */
            .mobile-progress-container {
                width: 100% !important;
                height: 12px; /* Increased container height for better hover/click */
                margin: 0 !important;
                padding: 0 !important;
                position: relative;
                z-index: 10;
                cursor: pointer;
            }

            .mobile-progress#playbackProgressBar {
                width: 100% !important;
                height: 4px !important;
                background: rgba(255,255,255,0.1) !important;
                background-image: linear-gradient(#48c774, #48c774) !important;
                background-size: var(--slider-progress, 0%) 100% !important;
                background-repeat: no-repeat !important;
                cursor: pointer !important;
                -webkit-appearance: none !important;
                position: absolute;
                bottom: 0; left: 0; /* Pin to absolute bottom */
                margin: 0 !important;
                z-index: 11;
            }

            .mobile-progress::-webkit-slider-thumb {
                -webkit-appearance: none !important;
                width: 14px;
                height: 14px;
                background: #48c774;
                border-radius: 50%;
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.2s;
                margin-top: -5px; /* Center on 4px track */
            }

            .mobile-progress-container:hover .mobile-progress::-webkit-slider-thumb {
                opacity: 1;
            }

            .mobile-progress-time {
                position: absolute;
                bottom: 12px; /* Above the bar */
                left: 2rem;
                right: 2rem;
                display: flex;
                justify-content: space-between;
                font-size: 0.7rem;
                color: rgba(255,255,255,0.5);
                pointer-events: none;
                z-index: 12;
            }

            /* Sidebar Playlist Styles */
            .nav-sub-group { padding-left: 1.5rem; margin-top: 0.25rem; max-height: 300px; overflow-y: auto; }
            .nav-sub-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; font-size: 0.85rem; color: rgba(255,255,255,0.5); border-radius: 6px; transition: 0.2s; }
            .nav-sub-item:hover { color: white; background: rgba(255,255,255,0.05); }
            .nav-sub-item.active { color: #48c774; background: rgba(72, 199, 116, 0.1); }

            /* Minimized Sidebar State */
            .plex-layout.collapsed .nav-sub-item span {
                display: block !important;
                width: 100% !important;
                text-align: center !important;
                font-weight: 900 !important;
                font-size: 1.1rem !important;
                text-transform: uppercase !important;
                overflow: hidden;
                max-width: 1ch;
                margin: 0 auto;
            }
            .plex-layout.collapsed .nav-sub-item i,
            .plex-layout.collapsed .create-playlist-btn,
            .plex-layout.collapsed .theme-toggle-btn,
            .plex-layout.collapsed .nav-label {
                display: none !important;
            }
        </style>
    </head>
    <body class="music-page">

        <div class="plex-layout" id="plex-layout">
            <aside class="plex-sidebar" id="plex-sidebar">
                <div class="sidebar-brand">
                    <img src="/logo.png" alt="JMedia" class="sidebar-logo" onclick="location.href='/'">
                    <span class="sidebar-brand-text" onclick="location.href='/'">JMedia</span>
                    <button id="themeToggle" class="button is-ghost theme-toggle-btn"><i id="themeIcon" class="pi pi-sun"></i></button>
                    <button class="button is-ghost sidebar-toggle" id="toggleSidebarBtn"><i class="pi pi-bars"></i></button>
                </div>
                
                <nav class="sidebar-nav">
                    <div class="nav-group">
                        <p class="nav-label">Music Library</p>
                        <a href="javascript:void(0)" class="nav-item active" id="nav-music" onclick="loadMobilePlaylistSongs(0)">
                            <i class="pi pi-play-circle"></i> <span>Music</span>
                        </a>
                        <p class="nav-label mt-3">Playlists</p>
                        <div class="nav-sub-group" id="sidebarPlaylistList"></div>
                        <a href="javascript:void(0)" class="nav-sub-item create-playlist-btn" onclick="openCreatePlaylistModal()">
                            <i class="pi pi-plus"></i> <span>New Playlist</span>
                        </a>
                    </div>

                    <div class="nav-group">
                        <p class="nav-label">Personal</p>
                        <a href="javascript:void(0)" class="nav-item" id="nav-queue" onclick="switchToTab('queue')"><i class="pi pi-list"></i> <span>Queue</span></a>
                        <a href="javascript:void(0)" class="nav-item" id="nav-history" onclick="switchToTab('history')"><i class="pi pi-history"></i> <span>History</span></a>
                    </div>

                    <div class="nav-group">
                        <p class="nav-label">Video Library</p>
                        <a href="/video" class="nav-item"><i class="pi pi-video"></i> <span>Videos</span></a>
                    </div>

                    <div class="nav-group mt-auto">
                        <a href="/settings" class="nav-item"><i class="pi pi-cog"></i> <span>Settings</span></a>
                        <a href="javascript:void(0)" class="nav-item" id="nav-profile" onclick="openMobileProfileModal()">
                            <i class="pi pi-user"></i> <span id="currentProfileName">Profile</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <div class="plex-main">
                <header class="plex-header">
                    <div class="search-container">
                        <div class="control has-icons-left"><input class="input is-rounded plex-search" type="text" placeholder="Search songs..." id="mobileSearch"><span class="icon is-left"><i class="pi pi-search"></i></span></div>
                    </div>
                </header>

                <main class="plex-content">
                    <div class="music-main-wrapper" id="musicContentArea">
                        <div id="mobileSongList" class="mobile-song-list"></div>
                        <div id="queueContent" class="is-hidden"></div>
                        <div id="historyContent" class="is-hidden"></div>
                    </div>

                    <div class="persistent-music-player">
                        <div class="mobile-player">
                            <div class="mobile-player-info">
                                <div class="mobile-player-artwork" id="songCoverImageContainer"><img id="songCoverImage" src="/logo.png" alt="Cover"><i class="pi pi-music" id="songCoverFallback" style="display: none;"></i></div>
                                <div class="mobile-player-details">
                                    <p id="songTitle" class="mobile-player-title">Loading...</p>
                                    <p id="songArtist" class="mobile-player-artist" onclick="filterByArtist()">Unknown Artist</p>
                                </div>
                            </div>
                            
                            <div class="mobile-player-controls">
                                <button id="shuffleBtn" class="mobile-btn"><i id="shuffleIcon" class="pi pi-sort-alt"></i></button>
                                <button id="prevBtn" class="mobile-btn"><i class="pi pi-step-backward"></i></button>
                                <button id="playPauseBtn" class="mobile-btn mobile-btn-primary"><i id="playPauseIcon" class="pi pi-play"></i></button>
                                <button id="nextBtn" class="mobile-btn"><i class="pi pi-step-forward"></i></button>
                                <button id="repeatBtn" class="mobile-btn"><i id="repeatIcon" class="pi pi-refresh"></i></button>
                            </div>

                            <div class="mobile-player-right-side">
                                <div class="mobile-volume-wrapper">
                                    <button id="volumeToggleBtn" class="mobile-btn"><i id="volumeIcon" class="pi pi-volume-up"></i></button>
                                    <div class="volume-slider-container">
                                        <input type="range" id="volumeProgressBar" class="vertical-volume" min="0" max="100" value="70">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mobile-progress-container">
                            <input type="range" id="playbackProgressBar" class="mobile-progress" min="0" max="100" value="0">
                            <div class="mobile-progress-time">
                                <span id="currentTime">0:00</span>
                                <span id="totalTime">0:00</span>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <audio id="audioPlayer" preload="auto"></audio>

        <!-- Modals -->
        <div id="mobileProfileModal" class="modal">
            <div class="modal-background" onclick="closeMobileProfileModal()"></div>
            <div class="modal-card glass-modal">
                <header class="modal-card-head">
                    <p class="modal-card-title">Profiles</p>
                    <button class="delete" aria-label="close" onclick="closeMobileProfileModal()"></button>
                </header>
                <div class="modal-card-body"><div id="mobileProfileList" class="profile-list-container"></div></div>
                <footer class="modal-card-foot" style="justify-content: space-between;">
                    <button class="button is-danger is-small" onclick="handleLogout()">Logout</button>
                    <button class="button is-small" onclick="closeMobileProfileModal()">Close</button>
                </footer>
            </div>
        </div>

        <div id="playlistModal" class="modal">
            <div class="modal-background" onclick="this.parentElement.classList.remove('is-active')"></div>
            <div class="modal-card glass-modal">
                <header class="modal-card-head"><p class="modal-card-title">New Playlist</p></header>
                <div class="modal-card-body">
                    <input class="input" type="text" id="newPlaylistName" placeholder="Playlist Name">
                </div>
                <footer class="modal-card-foot">
                    <button class="button is-success" onclick="confirmCreatePlaylist()">Create</button>
                    <button class="button" onclick="this.closest('.modal').classList.remove('is-active')">Cancel</button>
                </footer>
            </div>
        </div>

        <script src="/js/toast.js"></script>
        <script type="module" src="/js/musicBar.js"></script>
        <script type="module" src="/js/mediaSession.js"></script>
        <script type="module" src="/js/mobile.js"></script>

        <script>
            window.globalActiveProfileId = localStorage.getItem('activeProfileId') || '1';

            document.addEventListener('DOMContentLoaded', () => {
                const layout = document.getElementById('plex-layout');
                const toggleBtn = document.getElementById('toggleSidebarBtn');
                
                if (toggleBtn) {
                    toggleBtn.onclick = () => {
                        layout.classList.toggle('collapsed');
                        localStorage.setItem('sidebarCollapsed', layout.classList.contains('collapsed'));
                    };
                }
                if (localStorage.getItem('sidebarCollapsed') === 'true') layout.classList.add('collapsed');

                const applySidebar = (pos) => {
                    if (pos === 'right') layout.classList.add('sidebar-right');
                    else layout.classList.remove('sidebar-right');
                };
                
                const cachedPos = localStorage.getItem('sidebarPosition');
                if (cachedPos) applySidebar(cachedPos);
                
                fetch(`/api/settings/${window.globalActiveProfileId}/sidebar-position`)
                    .then(r => r.json()).then(json => { if(json.data) applySidebar(json.data); });

                fetchMobileCurrentProfile();
                initMobileMiniVolumeControl();
                loadMobilePlaylists();
            });

            function loadMobilePlaylists() {
                fetch(`/api/music/playlists/${window.globalActiveProfileId}`)
                    .then(r => r.json())
                    .then(data => {
                        const playlists = data.data || data;
                        const list = document.getElementById('sidebarPlaylistList');
                        if (!list) return;
                        list.innerHTML = playlists.map(p => `
                            <a href="javascript:void(0)" class="nav-sub-item" id="nav-playlist-${p.id}" onclick="loadMobilePlaylistSongs(${p.id})">
                                <span>${p.name}</span>
                            </a>
                        `).join('');
                    });
            }

            function loadMobilePlaylistSongs(id) {
                const isListVisible = !document.getElementById('mobileSongList').classList.contains('is-hidden');
                if (id === window.currentPlaylistId && isListVisible) return;

                document.querySelectorAll('.nav-item, .nav-sub-item').forEach(el => el.classList.remove('active'));
                if (id === 0) document.getElementById('nav-music').classList.add('active');
                else document.getElementById(`nav-playlist-${id}`)?.classList.add('active');

                document.getElementById('mobileSongList').classList.remove('is-hidden');
                document.getElementById('queueContent').classList.add('is-hidden');
                document.getElementById('historyContent').classList.add('is-hidden');

                if (window.htmx) {
                    window.htmx.ajax('GET', `/api/music/ui/tbody/${window.globalActiveProfileId}/${id}`, {
                        target: '#mobileSongList',
                        swap: 'innerHTML'
                    });
                    window.currentPlaylistId = id;
                }
            }

            function switchToTab(tab) {
                const targetPane = document.getElementById(`${tab}Content`);
                if (!targetPane) return;
                if (window.activeTab === tab && !targetPane.classList.contains('is-hidden')) return;

                document.querySelectorAll('.nav-item, .nav-sub-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`nav-${tab}`)?.classList.add('active');

                document.getElementById('mobileSongList').classList.add('is-hidden');
                document.getElementById('queueContent').classList.add('is-hidden');
                document.getElementById('historyContent').classList.add('is-hidden');

                targetPane.classList.remove('is-hidden');
                window.activeTab = tab;
                window.currentPlaylistId = null;

                if (window.htmx) {
                    const profileId = window.globalActiveProfileId || localStorage.getItem('activeProfileId') || '1';
                    const endpoint = tab === 'queue' ? `/api/music/ui/mobile-queue-fragment/${profileId}` : `/api/music/ui/mobile-history-fragment/${profileId}`;
                    window.htmx.ajax('GET', endpoint, { target: `#${tab}Content`, swap: 'innerHTML' });
                }
            }

            function openCreatePlaylistModal() { document.getElementById('playlistModal').classList.add('is-active'); }

            async function confirmCreatePlaylist() {
                const name = document.getElementById('newPlaylistName').value.trim();
                if (!name) return;
                const res = await fetch(`/api/music/playlists/${window.globalActiveProfileId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
                if (res.ok) { document.getElementById('playlistModal').classList.remove('is-active'); loadMobilePlaylists(); Toast.success('Playlist created'); }
            }

            function closeMobileProfileModal() { document.getElementById('mobileProfileModal').classList.remove('is-active'); }
            function fetchMobileCurrentProfile() { fetch('/api/profiles/current').then(r => r.json()).then(p => { document.getElementById('currentProfileName').textContent = p.name || 'Profile'; }); }
            function handleLogout() { fetch('/api/auth/logout', { method: 'POST' }).then(() => location.href = '/login.html'); }

            function openMobileProfileModal() {
                document.getElementById('mobileProfileModal').classList.add('is-active');
                fetch('/api/profiles').then(r => r.json()).then(data => {
                    document.getElementById('mobileProfileList').innerHTML = data.map(p => `
                        <div class="profile-item" onclick="switchToMobileProfile(${p.id})">
                            <div class="profile-avatar"><i class="pi pi-user"></i></div>
                            <div class="profile-item-name">${p.name}</div>
                        </div>
                    `).join('');
                });
            }

            function switchToMobileProfile(profileId) { fetch(`/api/profiles/switch/${profileId}`, { method: 'POST' }).then(() => { localStorage.setItem('activeProfileId', profileId); location.reload(); }); }

            function initMobileMiniVolumeControl() {
                const volumeSlider = document.getElementById('volumeProgressBar');
                const audioPlayer = document.getElementById('audioPlayer');
                if (!volumeSlider || !audioPlayer) return;
                
                // Initial fill
                const initialProgress = (volumeSlider.value / 100) * 100;
                volumeSlider.style.setProperty('--slider-progress', `${initialProgress}%`);

                volumeSlider.oninput = function() {
                    const val = Math.pow(this.value / 100, 2);
                    audioPlayer.volume = val;
                    
                    // Update green fill via CSS variable
                    const progress = (this.value / 100) * 100;
                    this.style.setProperty('--slider-progress', `${progress}%`);
                };
            }
        </script>
        <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 99999;"></div>
    </body>
</html>
