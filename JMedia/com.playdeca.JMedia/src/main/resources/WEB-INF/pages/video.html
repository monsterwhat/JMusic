<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title id="pageTitle">JMedia Videos</title>

        <script src="/js/theme-initializer.js"></script>
        <script src="/js/htmx.min.js"></script>
        
        <!-- Alpine.js for profiles -->
        <script defer src="/lib/alpine.min.js"></script>
        <script>
            document.addEventListener('alpine:init', () => {
                Alpine.store('profile', {
                    currentProfile: null
                });
            });
        </script>

        <!-- Bulma CSS -->
        <link rel="stylesheet" href="/css/bulma.min.css"/>
        <link rel="stylesheet" href="/lib/primeicons.css">
        <link rel="stylesheet" href="/css/custom.css"/>
        
        <link id="favicon" rel="icon" type="image/x-icon" href="logo.png">

    </head>
    <body class="video-page">

        <!-- HTMX + Alpine Integration -->
        <script>
            document.addEventListener('htmx:afterSettle', (evt) => {
                // Ensure Alpine.js processes newly added HTMX content (Alpine v3 way)
                if (window.Alpine && evt.detail.target) {
                    window.Alpine.initTree(evt.detail.target);
                }
            });
        </script>

        <!-- Plex/YouTube Style Layout -->
        <div class="plex-layout" id="plex-layout">
            
            <!-- Persistent Sidebar -->
            <aside class="plex-sidebar" id="plex-sidebar">
                <div class="sidebar-brand">
                    <img src="/logo.png" alt="JMedia" class="sidebar-logo" onclick="videoSPA.goHome()">
                    <span class="sidebar-brand-text" onclick="videoSPA.goHome()">JMedia</span>
                    
                    <button id="themeToggle" class="button is-ghost theme-toggle-btn" title="Toggle Theme">
                        <i id="themeIcon" class="pi pi-sun"></i>
                    </button>

                    <button class="button is-ghost sidebar-toggle" onclick="videoSPA.toggleSidebar()">
                        <i class="pi pi-bars"></i>
                    </button>
                </div>
                
                <nav class="sidebar-nav">
                    <div class="nav-group">
                        <p class="nav-label">Video Library</p>
                        <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="videoSPA.goHome()">
                            <i class="pi pi-video"></i> <span>Videos</span>
                        </a>
                        <a href="javascript:void(0)" class="nav-item" id="nav-movies" onclick="videoSPA.switchSection('movies')">
                            <i class="pi pi-ticket"></i> <span>Movies</span>
                        </a>
                        <a href="javascript:void(0)" class="nav-item" id="nav-shows" onclick="videoSPA.switchSection('shows')">
                            <i class="pi pi-desktop"></i> <span>TV Shows</span>
                        </a>
                    </div>

                    <div class="nav-group">
                        <p class="nav-label">Personal</p>
                        <a href="javascript:void(0)" class="nav-item" id="nav-history" onclick="videoSPA.switchSection('history')">
                            <i class="pi pi-history"></i> <span>History</span>
                        </a>
                        <a href="javascript:void(0)" class="nav-item" id="nav-watchlist" onclick="videoSPA.switchSection('watchlist')">
                            <i class="pi pi-bookmark"></i> <span>Watchlist</span>
                        </a>
                    </div>

                    <div class="nav-group">
                        <p class="nav-label">Music Library</p>
                        <a href="/" class="nav-item">
                            <i class="pi pi-play-circle"></i> <span>Music</span>
                        </a>
                    </div>

                    <div class="nav-group mt-auto" style="margin-top: auto; padding-top: 2rem;">
                        <a href="/settings" class="nav-item">
                            <i class="pi pi-cog"></i> <span>Settings</span>
                        </a>
                        <a href="javascript:void(0)" class="nav-item" id="openProfileModalBtn">
                            <i class="pi pi-user"></i> <span id="currentProfileName">Profile</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <!-- Main Scrollable Area -->
            <div class="plex-main">
                <!-- Top Header -->
                <header class="plex-header">
                    <div class="search-container">
                        <div class="control has-icons-left">
                            <input class="input is-rounded plex-search" type="text" placeholder="Search library..." name="search" id="globalSearchInput"
                                   hx-get="/api/video/ui/search-suggest"
                                   hx-trigger="keyup changed delay:300ms from:this"
                                   hx-target="#searchSuggestions"
                                   hx-swap="innerHTML">
                            <span class="icon is-left"><i class="pi pi-search"></i></span>
                        </div>
                        <div id="searchSuggestions" class="search-suggestions-dropdown"></div>
                    </div>
                </header>

                <!-- SPA Content -->
                <main id="spa-container" class="plex-content">
                    <div id="loading-state" class="loading-overlay" style="display: none;">
                        <i class="pi pi-spin pi-spinner" style="font-size: 2.5rem; color: #48c774;"></i>
                    </div>

                    <div id="spa-content" class="spa-content">
                        <!-- Hero Section (HTMX loaded) -->
                        <div id="hero-section" 
                             hx-get="/api/video/ui/hero-fragment"
                             hx-trigger="load"
                             hx-target="#hero-section"
                             hx-swap="innerHTML">
                        </div>
                        
                        <!-- Main Video Content (HTMX loaded) -->
                        <div id="carousels-section" 
                             hx-get="/api/video/ui/optimized-carousels"
                             hx-trigger="load delay:100ms"
                             hx-target="#carousels-section"
                             hx-swap="innerHTML">
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="/js/toast.js"></script>
        <script src="/js/navbar.js"></script>
        <script src="/js/profileManager.js"></script>
        <script src="/js/videoContextMenu.js"></script>
        
        <script>
            window.globalActiveProfileId = localStorage.getItem('activeProfileId') || '1';
        </script>
        
        <!-- SPA JavaScript -->
        <script>
            class VideoSPA {
                constructor() {
                    this.currentSection = 'home';
                    this.sections = {
                        home: 'home',
                        movies: '/api/video/ui/movies-fragment',
                        shows: '/api/video/ui/shows-fragment',
                        history: '/api/video/ui/history-fragment',
                        watchlist: '/api/video/ui/watchlist-fragment',
                        details: '/api/video/ui/details-fragment/\{videoId\}',
                        playback: '/api/video/ui/playback-fragment?videoId=\{videoId\}'
                    };
                }
                
                async switchSection(section, params = {}) {
                    this.showLoading();
                    
                    if (section === 'home') {
                        this.goHome();
                        return;
                    }

                    this.updateNavState(section);
                    const url = this.buildUrl(section, params);
                    try {
                        const html = await this.fetchContent(url);
                        this.updateContent(html);
                        this.hideLoading();
                        this.currentSection = section;
                    } catch (error) {
                        this.handleError(error);
                    }
                }
                
                goHome() {
                    this.updateNavState('home');
                    this.updateContent(`
                        <div id="hero-section" 
                             hx-get="/api/video/ui/hero-fragment"
                             hx-trigger="load"
                             hx-target="#hero-section"
                             hx-swap="innerHTML">
                        </div>
                        <div id="carousels-section" 
                             hx-get="/api/video/ui/optimized-carousels"
                             hx-trigger="load delay:100ms"
                             hx-target="#carousels-section"
                             hx-swap="innerHTML">
                        </div>
                    `);
                    if (window.htmx) {
                        htmx.process(document.getElementById('spa-content'));
                    }
                    this.currentSection = 'home';
                    this.hideLoading();
                }

                async selectItem(item, action) {
                    const videoId = (typeof item === 'object') ? item.id : item;
                    if (!videoId) return;

                    switch(action) {
                        case 'play':
                            await this.playVideo(videoId);
                            break;
                        case 'details':
                            await this.switchSection('details', {videoId: videoId});
                            break;
                    }
                }
                
                async playVideo(videoId) {
                    this.showLoading();
                    try {
                        await fetch('/api/video/playback/play/' + videoId, { method: 'POST' });
                        await this.switchSection('playback', {videoId: videoId});
                    } catch (error) {
                        this.handleError(error);
                    }
                }
                
                updateNavState(section) {
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    const activeNav = document.getElementById('nav-' + section);
                    if (activeNav) activeNav.classList.add('active');
                }

                buildUrl(section, params) {
                    let url = this.sections[section] || section;
                    for (const [key, value] of Object.entries(params)) {
                        url = url.replace('{' + key + '}', value);
                    }
                    return url;
                }
                
                async fetchContent(url) {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.text();
                }
                
                updateContent(html) {
                    const contentDiv = document.getElementById('spa-content');
                    if (contentDiv) {
                        contentDiv.innerHTML = html;
                        this.executeScripts(contentDiv);
                    }
                }
                
                executeScripts(container) {
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) newScript.src = script.src;
                        else newScript.textContent = script.textContent;
                        document.head.appendChild(newScript);
                        document.head.removeChild(newScript);
                    });
                }
                
                showLoading() {
                    const loadingDiv = document.getElementById('loading-state');
                    if (loadingDiv) loadingDiv.style.display = 'flex';
                }
                
                hideLoading() {
                    const loadingDiv = document.getElementById('loading-state');
                    if (loadingDiv) loadingDiv.style.display = 'none';
                }
                
                handleError(error) {
                    console.error('SPA Error:', error);
                    this.hideLoading();
                    const contentDiv = document.getElementById('spa-content');
                    if (contentDiv) {
                        contentDiv.innerHTML = '<div class="notification is-danger"><strong>Error:</strong> ' + error.message + '</div>';
                    }
                }

                toggleSidebar() {
                    const layout = document.getElementById('plex-layout');
                    layout.classList.toggle('collapsed');
                    // Store preference
                    localStorage.setItem('sidebarCollapsed', layout.classList.contains('collapsed'));
                }

                async checkResumePlayback() {
                    try {
                        const res = await fetch('/api/video/playback/current');
                        if (!res.ok) return;
                        const data = await res.json();
                        
                        // Also apply sidebar preference while we're checking state
                        this.applySidebarPreference();

                        if (data.success && data.video && data.video.id && data.video.playing) {
                            console.log('[VideoSPA] Resuming playback for video:', data.video.id);
                            this.switchSection('playback', {videoId: data.video.id});
                        }
                    } catch (e) {
                        console.error('[VideoSPA] Failed to check resume playback:', e);
                    }
                }

                async applySidebarPreference() {
                    try {
                        const profileId = localStorage.getItem('activeProfileId') || '1';
                        const res = await fetch(`/api/settings/${profileId}/sidebar-position`);
                        const json = await res.json();
                        if (res.ok && json.data) {
                            const layout = document.getElementById('plex-layout');
                            if (json.data === 'right') {
                                layout.classList.add('sidebar-right');
                            } else {
                                layout.classList.remove('sidebar-right');
                            }
                        }
                    } catch (e) {
                        console.error('[VideoSPA] Failed to apply sidebar preference:', e);
                    }
                }
            }

            const videoSPA = new VideoSPA();

            window.selectItem = (item, action) => videoSPA.selectItem(item, action);
            window.switchSection = (section, params) => videoSPA.switchSection(section, params);
            window.addToWatchlist = (title, id) => {
                if (window.showToast) window.showToast(title + ' added to watchlist', 'success');
            };
            window.scrollCarousel = (carouselId, direction) => {
                const carousel = document.getElementById(carouselId);
                if (carousel) {
                    const amount = 400;
                    carousel.scrollBy({ left: direction === 'left' ? -amount : amount, behavior: 'smooth' });
                }
            };

            document.addEventListener('DOMContentLoaded', () => {
                initKeyboardNavigation();
                initSearchClear();
                
                // Restore sidebar state
                if (localStorage.getItem('sidebarCollapsed') === 'true') {
                    document.getElementById('plex-layout').classList.add('collapsed');
                }

                // Auto-resume playback if applicable
                videoSPA.applySidebarPreference();
                videoSPA.checkResumePlayback();
            });

            function initKeyboardNavigation() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                        e.preventDefault();
                        document.getElementById('globalSearchInput').focus();
                    }
                });
            }
            
            function initSearchClear() {
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.search-container')) {
                        document.getElementById('searchSuggestions').innerHTML = '';
                    }
                });
            }
        </script>
    
    <!-- Profile Management Modal -->
    <div id="profileModal" class="modal">
      <div class="modal-background" onclick="document.getElementById('profileModal').classList.remove('is-active');"></div>
      <div class="modal-card glass-modal">
        <header class="modal-card-head glass-modal-header">
          <p class="modal-card-title">Manage Profiles</p>
          <button class="delete" aria-label="close" onclick="document.getElementById('profileModal').classList.remove('is-active');"></button>
        </header>
        <section class="modal-card-body glass-modal-body">
          <h5 class="title is-5">Current Profile: <span id="modalCurrentProfileName">Loading...</span></h5>
          <div class="field is-grouped is-grouped-multiline is-justify-content-center" id="profileList"></div>
          <hr>
          <div class="field has-addons">
              <div class="control is-expanded">
                  <input class="input" type="text" id="newProfileNameInput" placeholder="New Profile Name">
              </div>
              <div class="control">
                  <button class="button is-info" id="createProfileBtn">Create</button>
              </div>
          </div>
          <button class="button is-danger is-fullwidth mt-4" id="deleteCurrentProfileBtn">Delete Current Profile</button>
        </section>
        <footer class="modal-card-foot glass-modal-footer" style="justify-content: space-between;">
          <button class="button is-danger" onclick="handleLogout()">Logout</button>
          <button class="button" onclick="document.getElementById('profileModal').classList.remove('is-active');">Close</button>
        </footer>
      </div>
    </div>
</body>
</html>
