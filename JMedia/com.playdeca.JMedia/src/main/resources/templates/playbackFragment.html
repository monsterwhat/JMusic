<!-- Custom Modern Player -->
<link rel="stylesheet" href="/css/player.css"/>

<div class="player-container paused" id="customPlayer"
     data-video-id="{item.id}"
     data-title="{item.title ?: item.seriesTitle}"
     data-path="{item.path.replace('\\', '/')}"
     data-duration="{item.duration}"
     data-type="{item.type}"
     data-meta="{#if item.type == 'Episode' || item.type == 'episode'}S{item.seasonNumber}E{item.episodeNumber} • {item.episodeTitle ?: 'Untitled'}{#else}{item.releaseYear ?: ''}{/if}"
     data-start-time="{resumeTime}"
     data-next-id="{nextEpisodeId}"
     data-intro-start="{item.introStart ?: 0}"
     data-intro-end="{item.introEnd ?: 0}"
     data-outro-start="{item.outroStart ?: 0}"
     data-outro-end="{item.outroEnd ?: 0}"
     data-recap-start="{item.recapStart ?: 0}"
     data-recap-end="{item.recapEnd ?: 0}">
    
    <div class="video-wrapper">
        <video id="videoElement" crossorigin="anonymous" playsinline autoplay>
            <source src="/api/video/stream/{item.id}" type="video/mp4">
        </video>
    </div>
</div>

<script src="/js/simple-player.js"></script>
<script>
    (function() {
        console.log("[Playback] Fragment Loaded. Initializing...");
        
        // Set back destination to go to details page
        if (window.videoSPA) {
            videoSPA.backDestination = {
                section: 'details',
                params: { videoId: {item.id} }
            };
        }
        
        const tryInit = () => {
            if (window.SimplePlayer) {
                new window.SimplePlayer({
                    containerId: 'customPlayer',
                    videoId: 'videoElement',
                    currentVideoId: {item.id}
                });
            } else {
                setTimeout(tryInit, 50);
            }
        };

        tryInit();
    })();
</script>
