<div class="player-container">
    <!-- Video.js Player -->
    <div class="video-wrapper">
        <video
            id="videoPlayer"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="auto"
            data-setup='{}'
            width="100%"
            height="100%">
            <source src="/api/video/stream/{item.id}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Media Info -->
    <div id="mediaInfo" class="media-info">
        <div class="info-title">{item.title ?: item.seriesTitle}</div>
        <div class="info-meta">
            {#if item.type == 'Episode'}
            S{item.seasonNumber}E{item.episodeNumber}: {item.episodeTitle ?: 'Untitled Episode'}
            {#else}
            {item.title}
            {/if}
            • {item.releaseYear ?: '2024'} • {formatDuration(item.durationSeconds)}
        </div>
    </div>

    <!-- Subtitle Controls -->
    <div class="subtitle-controls">
        <!-- Include subtitle track selector component -->
        <div id="subtitleTrackSelectorContainer"></div>
        
        <!-- Settings button -->
        <button class="subtitle-settings-btn" onclick="toggleSubtitleSettings()" title="Subtitle Settings">
            <i class="pi pi-cog"></i>
        </button>
    </div>

    <!-- Close Button -->
    <button class="close-button" onclick="window.switchSection('details')">
        <i class="pi pi-times"></i>
    </button>
</div>

<script>
    // Initialize Video.js player
    function initializePlayer() {
        const videoId = {item.id};
        console.log('Initializing player for video ID:', videoId);
        
        // Clean up existing player if it exists
        if (videojs.getPlayers()['videoPlayer']) {
            console.log('Disposing existing player instance');
            videojs.getPlayers()['videoPlayer'].dispose();
        }

        // Initialize Video.js
        const player = videojs('videoPlayer', {
            controls: true,
            autoplay: true,
            preload: 'auto',
            fluid: true,
            responsive: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            html5: {
                vhs: {
                    overrideNative: true
                }
            }
        });

        // Set global reference for keyboard controls and cleanup
        window.activeVideoPlayer = player;
        window.currentVideoId = videoId;

        // Remove loading overlay when ready
        player.ready(() => {
            console.log('Player ready');
            document.getElementById('loadingOverlay')?.classList.add('hidden');
            showMediaInfo();
            loadSubtitleTracks(player, videoId);
        });

        // Handle errors
        player.on('error', () => {
            const error = player.error();
            console.error('Video.js Error:', error);
            document.getElementById('loadingOverlay')?.classList.add('hidden');
            document.getElementById('errorOverlay')?.classList.add('show');
        });

        // Show media info briefly on play
        player.on('play', () => {
            showMediaInfo();
        });

        // Keyboard controls
        document.removeEventListener('keydown', handleKeyPress);
        document.addEventListener('keydown', handleKeyPress);
    }

    // Load subtitle tracks for the current video
    async function loadSubtitleTracks(playerInstance, videoId) {
        try {
            const userId = getCurrentUserId();
            const response = await fetch(`/api/video/subtitles/${videoId}`, {
                method: 'GET',
                headers: userId ? { 'X-User-ID': userId } : {}
            });
            
            if (!response.ok) {
                console.warn('Failed to load subtitle tracks');
                return;
            }
            
            const data = await response.json();
            const tracks = data.tracks || [];
            
            // Clear existing text tracks
            const existingTracks = playerInstance.textTracks();
            for (let i = existingTracks.length - 1; i >= 0; i--) {
                playerInstance.removeRemoteTextTrack(existingTracks[i]);
            }
            
            // Add subtitle tracks to player
            tracks.forEach((track, index) => {
                const trackElement = {
                    kind: 'subtitles',
                    label: track.displayName || track.languageName,
                    language: track.languageCode,
                    src: `/api/video/subtitles/track/${track.id}`,
                    default: track.isDefault || index === 0
                };
                
                playerInstance.addRemoteTextTrack(trackElement, false);
            });
            
            // Enable the subtitle menu if tracks are available
            if (tracks.length > 0 && playerInstance.controlBar.subtitlesButton) {
                playerInstance.controlBar.subtitlesButton.show();
            }
            
        } catch (error) {
            console.error('Error loading subtitle tracks:', error);
        }
    }
    
    // Get current user ID
    function getCurrentUserId() {
        return window.currentUserId || localStorage.getItem('activeProfileId') || null;
    }

    // Show media info
    function showMediaInfo() {
        const info = document.getElementById('mediaInfo');
        if (info) {
            info.classList.add('show');
            setTimeout(() => {
                info.classList.remove('show');
            }, 3000);
        }
    }

    // Keyboard controls
    function handleKeyPress(e) {
        const player = window.activeVideoPlayer;
        if (!player) return;
        
        // Don't trigger if user is typing in an input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch(e.key) {
            case ' ':
                e.preventDefault();
                if (player.paused()) {
                    player.play();
                } else {
                    player.pause();
                }
                break;
            case 'ArrowLeft':
                e.preventDefault();
                player.currentTime(player.currentTime() - 10);
                break;
            case 'ArrowRight':
                e.preventDefault();
                player.currentTime(player.currentTime() + 10);
                break;
            case 'f':
                e.preventDefault();
                if (player.isFullscreen()) {
                    player.exitFullscreen();
                } else {
                    player.requestFullscreen();
                }
                break;
            case 'm':
                e.preventDefault();
                player.muted(!player.muted());
                break;
            case 'c':
                e.preventDefault();
                toggleSubtitles(player);
                break;
            case 'Escape':
                e.preventDefault();
                if (player.isFullscreen()) {
                    player.exitFullscreen();
                } else {
                    window.switchSection('details', { videoId: window.currentVideoId });
                }
                break;
        }
    }
    
    // Toggle subtitle visibility
    function toggleSubtitles(playerInstance) {
        const tracks = playerInstance.textTracks();
        let hasEnabledSubtitle = false;
        
        // Check if any subtitle track is enabled
        for (let i = 0; i < tracks.length; i++) {
            if (tracks[i].kind === 'subtitles' && tracks[i].mode === 'showing') {
                tracks[i].mode = 'hidden';
                hasEnabledSubtitle = true;
                break;
            }
        }
        
        // If no subtitle was enabled, enable the first one
        if (!hasEnabledSubtitle) {
            for (let i = 0; i < tracks.length; i++) {
                if (tracks[i].kind === 'subtitles') {
                    tracks[i].mode = 'showing';
                    break;
                }
            }
        }
    }

    // Format duration
    function formatDuration(seconds) {
        if (!seconds) return '0m';
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        return hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
    }

    // Load subtitle components
    async function loadSubtitleComponents() {
        try {
            // Check if containers already exist
            if (document.getElementById('subtitleSettingsModal')) return;

            // Load subtitle track selector
            const selectorResponse = await fetch('/templates/subtitleTrackSelector.html');
            if (selectorResponse.ok) {
                const selectorHtml = await selectorResponse.text();
                const container = document.getElementById('subtitleTrackSelectorContainer');
                if (container) container.innerHTML = selectorHtml;
            }
            
            // Load subtitle settings panel
            const settingsResponse = await fetch('/templates/subtitleSettingsComponent.html');
            if (settingsResponse.ok) {
                const settingsHtml = await settingsResponse.text();
                const settingsDiv = document.createElement('div');
                settingsDiv.id = 'subtitleSettingsModalContainer';
                settingsDiv.innerHTML = settingsHtml;
                document.body.appendChild(settingsDiv);
            }
        } catch (error) {
            console.error('Error loading subtitle components:', error);
        }
    }

    // Execute initialization immediately
    console.log('Playback fragment script executing');
    initializePlayer();
    loadSubtitleComponents();
</script>
