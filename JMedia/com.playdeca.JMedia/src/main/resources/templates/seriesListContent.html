<div class="library-header">
    <h1 class="library-title">TV Shows</h1>
    <p class="nav-label">{totalItems} Shows</p>
</div>

<div id="seriesList">
    {#if series.empty}
        <div class="carousel-empty-state">
            <i class="pi pi-desktop"></i>
            <h3>No shows found</h3>
            <p>Try scanning your library or check if your episodes have series titles.</p>
        </div>
    {#else}
        <div class="plex-grid">
            {#for entry in series}
                <div class="plex-card" onclick="window.switchSection('seasons', \{encodedTitle: '{entry.encodedTitle}'\})">
                    <div class="plex-card-poster">
                        {#if entry.sampleVideoId}
                            <img class="poster-img" src="/api/video/thumbnail/{entry.sampleVideoId}" alt="{entry.rawTitle}" loading="lazy">
                        {#else}
                            <div class="carousel-empty-state" style="height: 100%; padding: 1rem;">
                                <i class="pi pi-image"></i>
                            </div>
                        {/if}
                    </div>
                    <div class="plex-card-info">
                        <div class="plex-card-title">{entry.rawTitle}</div>
                        <div class="plex-card-meta">Series</div>
                    </div>
                </div>
            {/for}
        </div>

        {#if totalPages > 1}
        <nav class="pagination is-centered mt-6" role="navigation" aria-label="pagination">
            <a class="pagination-previous"
               hx-get="/api/video/ui/shows-fragment?page={currentPage - 1}&limit={limit}"
               hx-target="#spa-content"
               {#if currentPage == 1}disabled style="opacity: 0.5; pointer-events: none;"{/if}>Previous</a>
            <a class="pagination-next"
               hx-get="/api/video/ui/shows-fragment?page={currentPage + 1}&limit={limit}"
               hx-target="#spa-content"
               {#if currentPage == totalPages}disabled style="opacity: 0.5; pointer-events: none;"{/if}>Next page</a>
        </nav>
        {/if}
    {/if}
</div>
