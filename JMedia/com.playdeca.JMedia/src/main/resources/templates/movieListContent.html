<div class="library-header is-flex is-justify-content-between is-align-items-center">
    <div>
        <h1 class="library-title">Movies</h1>
        <p class="nav-label">{totalItems} Movies</p>
    </div>

    <div class="library-actions is-flex is-align-items-center">
        <div class="sort-selector mr-4">
            <span class="mr-2 has-text-grey-light is-size-7 is-uppercase has-text-weight-bold">Sort By:</span>
            <div class="select is-small is-rounded is-dark">
                <select name="sort" 
                        hx-get="/api/video/ui/movies-fragment?page=1&limit={limit}" 
                        hx-target="#spa-content"
                        hx-trigger="change"
                        onchange="this.name='sortBy'; const dir = this.options[this.selectedIndex].dataset.dir; let url = this.getAttribute('hx-get') + '&sortBy=' + this.value + '&sortDirection=' + dir; htmx.ajax('GET', url, \{target: '#spa-content'\});">
                    <option value="dateAdded" data-dir="desc" {#if sortBy == 'dateAdded' && sortDirection == 'desc'}selected{/if}>Recently Added</option>
                    <option value="dateAdded" data-dir="asc" {#if sortBy == 'dateAdded' && sortDirection == 'asc'}selected{/if}>Oldest Added</option>
                    <option value="lastWatched" data-dir="desc" {#if sortBy == 'lastWatched'}selected{/if}>Recently Played</option>
                    <option value="title" data-dir="asc" {#if sortBy == 'title' && sortDirection == 'asc'}selected{/if}>Alphabetical (A-Z)</option>
                    <option value="title" data-dir="desc" {#if sortBy == 'title' && sortDirection == 'desc'}selected{/if}>Alphabetical (Z-A)</option>
                </select>
            </div>
        </div>
    </div>
</div>

<div id="movieList">
    {#if movies.empty}
        <div class="carousel-empty-state">
            <i class="pi pi-video"></i>
            <h3>No movies found</h3>
            <p>Try scanning your library</p>
        </div>
    {#else}
        <div class="plex-grid">
            {#for movie in movies}
                <div class="plex-card" data-video-id="{movie.id}" onclick="window.selectItem({movie.id}, 'details')">
                    <div class="plex-card-poster">
                        <img class="poster-img" src="/api/video/thumbnail/{movie.id}" alt="{movie.title}" loading="lazy">
                        <div class="plex-card-overlay">
                            <div class="plex-play-btn" onclick="event.stopPropagation(); window.selectItem({movie.id}, 'play')">
                                <i class="pi pi-play"></i>
                            </div>
                        </div>
                    </div>
                    <div class="plex-card-info">
                        <div class="plex-card-title">{movie.title}</div>
                        <div class="plex-card-meta">{movie.releaseYear}</div>
                    </div>
                </div>
            {/for}
        </div>

        {#if totalPages > 1}
        <nav class="plex-pagination mt-6" role="navigation" aria-label="pagination">
            <div class="is-flex is-align-items-center is-justify-content-center">
                <a class="pagination-btn {#if currentPage == 1}is-disabled{/if}"
                   hx-get="/api/video/ui/movies-fragment?page={currentPage - 1}&limit={limit}&sortBy={sortBy}&sortDirection={sortDirection}"
                   hx-target="#spa-content"
                   {#if currentPage == 1}disabled style="opacity: 0.5; pointer-events: none;"{/if}>
                    <i class="pi pi-chevron-left"></i> Previous
                </a>

                <span class="pagination-info mx-5">
                    Page <strong>{currentPage}</strong> of <strong>{totalPages}</strong>
                </span>

                <a class="pagination-btn {#if currentPage == totalPages}is-disabled{/if}"
                   hx-get="/api/video/ui/movies-fragment?page={currentPage + 1}&limit={limit}&sortBy={sortBy}&sortDirection={sortDirection}"
                   hx-target="#spa-content"
                   {#if currentPage == totalPages}disabled style="opacity: 0.5; pointer-events: none;"{/if}>
                    Next <i class="pi pi-chevron-right"></i>
                </a>
            </div>
        </nav>
        {/if}
    {/if}
</div>
