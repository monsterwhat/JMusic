<!-- Subtitle Settings Component -->
<div class="subtitle-settings-overlay" id="subtitleSettingsOverlay" style="display: none;">
    <div class="subtitle-settings-panel">
        <div class="subtitle-settings-header">
            <h3>Subtitle Settings</h3>
            <button class="close-btn" onclick="window.toggleSubtitleSettings()">
                <i class="pi pi-times"></i>
            </button>
        </div>
        
        <!-- Track Selection -->
        <div class="setting-group">
            <label for="subtitleTrack">Subtitle Track</label>
            <select id="subtitleTrack" onchange="changeSubtitleTrack(this.value)">
                <option value="off">Off</option>
            </select>
        </div>
        
        <!-- Subtitle Correction -->
        <div class="setting-group">
            <label>Timing Correction (Offset)</label>
            <div class="correction-controls">
                <button class="btn-small" onclick="adjustSubtitleCorrection(-0.5)">-0.5s</button>
                <div class="correction-display" id="subtitleCorrectionVal">0.0s</div>
                <button class="btn-small" onclick="adjustSubtitleCorrection(0.5)">+0.5s</button>
                <button class="btn-small btn-outline" onclick="resetSubtitleCorrection()">Reset</button>
            </div>
            <p class="help-text">Use this if subtitles are out of sync with audio.</p>
        </div>

        <div class="divider"></div>

        <!-- Font Size -->
        <div class="setting-group">
            <label for="subtitleSize">Font Size</label>
            <div class="slider-container">
                <input type="range" id="subtitleSize" min="12" max="48" value="20" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleSizeValue">20px</span>
            </div>
        </div>
        
        <!-- Font Color -->
        <div class="setting-group">
            <label for="subtitleColor">Text Color</label>
            <div class="color-picker-container">
                <input type="color" id="subtitleColor" value="#ffffff" 
                       oninput="updatePreviewStyle()">
                <button class="preset-color" style="background:#ffffff" onclick="setSubtitleColor('#ffffff')"></button>
                <button class="preset-color" style="background:#ffff00" onclick="setSubtitleColor('#ffff00')"></button>
                <button class="preset-color" style="background:#00ff00" onclick="setSubtitleColor('#00ff00')"></button>
            </div>
        </div>
        
        <!-- Background Opacity -->
        <div class="setting-group">
            <label for="subtitleBgOpacity">Background Opacity</label>
            <div class="slider-container">
                <input type="range" id="subtitleBgOpacity" min="0" max="1" step="0.1" value="0.7" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleBgOpacityValue">0.7</span>
            </div>
        </div>

        <!-- Distance from Bottom -->
        <div class="setting-group">
            <label for="subtitleBottom">Bottom Distance</label>
            <div class="slider-container">
                <input type="range" id="subtitleBottom" min="20" max="200" step="5" value="60" 
                       oninput="updatePreviewStyle()">
                <span id="subtitleBottomValue">60px</span>
            </div>
        </div>
        
        <!-- Preview -->
        <div class="subtitle-preview-box">
            <div id="subSettingsPreviewText">Sample Subtitle Text</div>
        </div>
        
        <!-- Action Buttons -->
        <div class="setting-actions">
            <button class="btn-secondary" onclick="resetSubtitleStyles()">Reset Styles</button>
            <button class="btn-primary" onclick="window.saveSubtitleSettings()">Save & Close</button>
        </div>
    </div>
</div>

<script>
// Initialize settings
window.initializeSubtitleSettings = function() {
    const mgr = window.subtitleManager;
    if (!mgr) return;
    
    const style = mgr.getStyle();
    
    // Set UI values
    document.getElementById('subtitleSize').value = style.size;
    document.getElementById('subtitleSizeValue').textContent = style.size + 'px';
    document.getElementById('subtitleColor').value = style.color;
    document.getElementById('subtitleBgOpacity').value = style.bgOpacity;
    document.getElementById('subtitleBgOpacityValue').textContent = style.bgOpacity;
    document.getElementById('subtitleBottom').value = style.bottom;
    document.getElementById('subtitleBottomValue').textContent = style.bottom + 'px';
    
    // Set correction
    updateCorrectionUI(style.correction);
    
    updatePreviewStyle();
    updateSubtitleTrackOptions();
}

function updateCorrectionUI(val) {
    const el = document.getElementById('subtitleCorrectionVal');
    if (el) el.textContent = (val > 0 ? '+' : '') + val.toFixed(1) + 's';
}

function adjustSubtitleCorrection(delta) {
    let current = parseFloat(localStorage.getItem('jmedia_subtitle_correction') || 0);
    current += delta;
    localStorage.setItem('jmedia_subtitle_correction', current);
    updateCorrectionUI(current);
    
    // Apply immediately to player
    if (window.currentPlayerInstance) {
        window.currentPlayerInstance.loadSubtitles();
    }
}

function resetSubtitleCorrection() {
    localStorage.setItem('jmedia_subtitle_correction', 0);
    updateCorrectionUI(0);
    if (window.currentPlayerInstance) {
        window.currentPlayerInstance.loadSubtitles();
    }
}

function setSubtitleColor(color) {
    document.getElementById('subtitleColor').value = color;
    updatePreviewStyle();
}

function updatePreviewStyle() {
    const size = document.getElementById('subtitleSize').value;
    const color = document.getElementById('subtitleColor').value;
    const opacity = document.getElementById('subtitleBgOpacity').value;
    const bottom = document.getElementById('subtitleBottom').value;
    
    document.getElementById('subtitleSizeValue').textContent = size + 'px';
    document.getElementById('subtitleBgOpacityValue').textContent = opacity;
    document.getElementById('subtitleBottomValue').textContent = bottom + 'px';
    
    const preview = document.getElementById('subSettingsPreviewText');
    preview.style.fontSize = (size * 0.8) + 'px';
    preview.style.color = color;
    preview.style.backgroundColor = 'rgba(0,0,0,' + opacity + ')';
    
    // Auto-apply if manager exists
    if (window.subtitleManager) {
        window.subtitleManager.applyGlobalStyle({
            font: "'Segoe UI', sans-serif",
            size: parseInt(size),
            color: color,
            bgOpacity: parseFloat(opacity),
            lineHeight: 1.4,
            bottom: parseInt(bottom)
        });
    }
}

async function updateSubtitleTrackOptions() {
    const videoId = window.currentPlayerInstance?.videoId;
    if (!videoId) return;
    
    try {
        const res = await fetch('/api/video/subtitles/' + videoId);
        if (res.ok) {
            const data = await res.json();
            const select = document.getElementById('subtitleTrack');
            const tracks = data.tracks || [];
            
            // Keep "Off"
            select.innerHTML = '<option value="off">Off</option>';
            
            tracks.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = (t.displayName || t.filename) + ' (' + (t.isEmbedded ? 'Embedded' : 'External') + ')';
                select.appendChild(opt);
            });
            
            const lastTrackId = localStorage.getItem('jmedia_last_track_' + videoId);
            if (lastTrackId) select.value = lastTrackId;
        }
    } catch(e) {}
}

function changeSubtitleTrack(trackId) {
    if (window.currentPlayerInstance) {
        const list = window.currentPlayerInstance.subtitleList;
        const opt = list?.querySelector('.subtitle-option[data-id="' + trackId + '"]');
        if (opt) opt.click();
        else if (trackId === 'off') window.currentPlayerInstance.turnOffSubtitles();
    }
}

function resetSubtitleStyles() {
    if (window.subtitleManager) {
        const defaults = {
            font: "'Segoe UI', sans-serif",
            size: 20,
            color: '#ffffff',
            bgOpacity: 0.7,
            lineHeight: 1.4,
            bottom: 60
        };
        
        document.getElementById('subtitleSize').value = defaults.size;
        document.getElementById('subtitleColor').value = defaults.color;
        document.getElementById('subtitleBgOpacity').value = defaults.bgOpacity;
        document.getElementById('subtitleBottom').value = defaults.bottom;
        
        updatePreviewStyle();
    }
}

window.saveSubtitleSettings = function() {
    if (window.subtitleManager) {
        window.subtitleManager.saveStyle({
            font: "'Segoe UI', sans-serif",
            size: parseInt(document.getElementById('subtitleSize').value),
            color: document.getElementById('subtitleColor').value,
            bgOpacity: parseFloat(document.getElementById('subtitleBgOpacity').value),
            lineHeight: 1.4,
            bottom: parseInt(document.getElementById('subtitleBottom').value)
        });
    }
    window.toggleSubtitleSettings();
}

window.toggleSubtitleSettings = function() {
    const overlay = document.getElementById('subtitleSettingsOverlay');
    if (overlay) {
        const isVisible = overlay.style.display !== 'none';
        overlay.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) initializeSubtitleSettings();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (window.subtitleManager) initializeSubtitleSettings();
});
</script>

<style>
.subtitle-settings-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center;
    z-index: 10000; backdrop-filter: blur(10px);
}
.subtitle-settings-panel {
    background: rgba(20, 20, 20, 0.95); border-radius: 12px; padding: 24px;
    width: 90%; max-width: 420px; color: white; border: 1px solid rgba(255, 255, 255, 0.1);
    max-height: 90vh; overflow-y: auto;
}
.subtitle-settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.divider { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
.setting-group { margin-bottom: 16px; }
.setting-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #aaa; }
.setting-group select { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; }
.correction-controls { display: flex; align-items: center; gap: 10px; }
.correction-display { flex: 1; text-align: center; font-weight: bold; font-family: monospace; font-size: 1.2rem; background: #000; padding: 5px; border-radius: 4px; }
.btn-small { padding: 5px 10px; background: #444; border: none; color: white; border-radius: 4px; cursor: pointer; }
.btn-small:hover { background: #555; }
.btn-outline { background: transparent; border: 1px solid #555; }
.help-text { font-size: 0.75rem; color: #777; margin-top: 5px; }
.slider-container { display: flex; align-items: center; gap: 10px; }
.slider-container input { flex: 1; }
.slider-container span { min-width: 45px; font-size: 0.8rem; }
.color-picker-container { display: flex; gap: 8px; align-items: center; }
.preset-color { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #666; cursor: pointer; }
.subtitle-preview-box { 
    margin: 20px 0; padding: 30px 10px; background: #111; border-radius: 8px; 
    display: flex; justify-content: center; align-items: center; border: 1px dashed #333;
}
#subSettingsPreviewText { padding: 4px 12px; border-radius: 4px; text-align: center; }
.setting-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-primary { flex: 1; background: #48c774; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
.btn-secondary { flex: 1; background: #333; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
</style>
