<div class="library-header">
    <h1 class="library-title">Watchlist</h1>
    <p class="nav-label">Saved to watch later</p>
</div>

{#if videos.empty}
    <div class="carousel-empty-state">
        <i class="pi pi-bookmark"></i>
        <h3>Your watchlist is empty</h3>
        <p>Save movies and shows to watch them later.</p>
    </div>
{#else}
    <div class="standard-grid">
        {#for video in videos}
            <div class="standard-card" data-video-id="{video.id}" onclick="window.selectItem({video.id}, 'details')">
                <div class="standard-card-poster">
                    <img class="poster-img" src="/api/video/thumbnail/{video.id}" alt="{video.title}" loading="lazy">
                    <div class="standard-card-overlay">
                        <div class="standard-play-btn" onclick="event.stopPropagation(); window.selectItem({video.id}, 'play')">
                            <i class="pi pi-play"></i>
                        </div>
                        <div class="standard-watchlist-btn remove-btn" onclick="event.stopPropagation(); window.addToWatchlist('{video.title ?: video.seriesTitle}', {video.id})" title="Remove from Watchlist">
                            <i class="pi pi-times"></i>
                        </div>
                    </div>
                </div>
                <div class="standard-card-info">
                    <div class="standard-card-title">{video.title ?: video.seriesTitle}</div>
                    <div class="standard-card-meta">
                        {video.type == 'episode' ? 'Series' : 'Movie'}
                        {#if video.releaseYear} • {video.releaseYear}{/if}
                    </div>
                </div>
            </div>
        {/for}
    </div>
{/if}
