{#for s in songs}
<tr data-song-id="{s.id}" class="{#if currentSong != null && s.id == currentSong.id}current-song-row{/if}" 
    data-playlist-id="{playlistId}"
    style="cursor: pointer;">
    <!-- Artwork (first column under empty header) -->
    <td class="has-text-centered" style="width: 5%;">
        <figure class="image is-48x48 is-inline-block">
            <img src="/api/music/stream/artwork/{s.id}" loading="lazy" alt="Artwork" onerror="this.onerror=null; this.src='/logo.png'; this.alt=''">
        </figure>
    </td>

    <!-- Title -->
    <td>
        <div class="has-text-weight-semibold">{s.title ?: "Unknown Title"}</div>
    </td>

    <!-- Artist -->
    <td>
        <div class="has-text-success is-size-7">{s.artist ?: "Unknown Artist"}</div>
    </td>

    <!-- Date -->
    <td class="has-text-centered is-centered is-vcentered has-text-weight-semibold">{formatDate.apply(s.dateAdded)}</td>

    <!-- Duration -->
    <td class="has-text-centered is-centered is-vcentered has-text-weight-semibold">{formatDuration.apply(s.durationSeconds)}</td>

    <!-- Action button -->
    <td class="has-text-centered is-centered is-vcentered">
        <div class="buttons is-small is-grouped is-centered is-vcentered">
            {#if playlistId == 0}
            <button
                        class="has-text-info"
                        hx-get="/api/music/ui/add-to-playlist-dialog/{profileId}/{s.id}"
                        hx-target="#addToPlaylistModalContent"
                        hx-swap="innerHTML"
                        hx-on::after-request="document.getElementById('addToPlaylistModal').classList.add('is-active')">
                        <i class="pi pi-plus"></i>
                    </button>
            {/if}
        </div>
    </td>
</tr>
{/for}

{#if hasMore}
<tr class="load-more-row"
    hx-get="/api/music/ui/tbody-more/{profileId}/{playlistId}?page={nextPage}&limit={limit}{#if search}&search={search}{/if}{#if sortBy}&sortBy={sortBy}{/if}{#if sortDirection}&sortDirection={sortDirection}{/if}"
    hx-trigger="click"
    hx-swap="outerHTML">
    <td colspan="6" class="has-text-centered py-3">
        <button class="button is-small is-rounded is-info is-light">
            <span class="htmx-indicator"><i class="pi pi-spin pi-spinner"></i> Loading...</span>
            <span class="load-more-text"><i class="pi pi-chevron-down mr-1"></i> Load More</span>
        </button>
    </td>
</tr>
{#else if currentPage > 1}
<tr class="load-more-row">
    <td colspan="6" class="has-text-centered has-text-grey-light py-3 is-size-7">— end —</td>
</tr>
{/if}
