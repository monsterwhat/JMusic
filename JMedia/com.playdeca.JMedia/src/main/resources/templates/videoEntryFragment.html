<div class="video-entry video-card" data-video-id="{video.id}" onclick="playVideo(this, \{'id': '{video.id}', 'title': '{video.title}', 'releaseYear': '{video.releaseYear}', 'durationSeconds': '{video.durationSeconds}', 'episodeNumber': '{video.episodeNumber}', 'episodeTitle': '{video.episodeTitle}'\})">
    <div class="video-thumbnail">
        <img src="/images/placeholders/video-small.jpg" alt="Placeholder image" />
    </div>
    <div class="video-title">
        {#if video.episodeNumber}E{video.episodeNumber} - {video.episodeTitle or video.title or video.filename or 'Unknown Episode'}{else}{video.title or video.filename or 'Unknown Video'} {#if video.releaseYear} ({video.releaseYear}) {/if}{/if}
    </div>
</div>
