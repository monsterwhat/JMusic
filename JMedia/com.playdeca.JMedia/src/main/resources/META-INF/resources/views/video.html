<main id="spa-container" class="standard-content">
    <div id="loading-state" class="loading-overlay" style="display: none;">
        <i class="pi pi-spin pi-spinner" style="font-size: 2.5rem; color: #48c774;"></i>
    </div>

    <div id="spa-content" class="spa-content">
        <!-- Hero Section (HTMX loaded) -->
        <div id="hero-section" 
             hx-get="/api/video/ui/hero-fragment"
             hx-trigger="load"
             hx-target="#hero-section"
             hx-swap="innerHTML">
        </div>
        
        <!-- Main Video Content (HTMX loaded) -->
        <div id="carousels-section" 
             hx-get="/api/video/ui/optimized-carousels"
             hx-trigger="load delay:100ms"
             hx-target="#carousels-section"
             hx-swap="innerHTML">
        </div>
    </div>
</main>
